    var el = document.createElement('div');
    el.style.cssText = 'color:#F3EFE4;background:#1B1F2A;padding:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;min-height:100vh;box-sizing:border-box;';
    el.textContent = '에러 발생: ' + msg;
    if (document.body) {
      document.body.innerHTML = '';
      document.body.appendChild(el);
    } else {
      window.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = '';
        document.body.appendChild(el);
      });
    }
  }
  window.addEventListener('error', function (e) {
    var msg = e.message || '스크립트 로드 실패';
    if (e.filename) msg += ' (' + e.filename + ')';
    showFatal(msg);
  }, true);
</script>

function fmtKRW(n) {
  if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + '억';
  if (Math.abs(n) >= 10000) return Math.round(n / 10000).toLocaleString() + '만';
  return Math.round(n).toLocaleString();
}

function gaussian() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function stageForYear(year) {
  if (year <= 2029) return 'stage1Target';
  if (year <= 2032) return 'stage2Target';
  return 'stage3Target';
}

function runMonteCarlo(categories, totalAmount, numSims = 1500) {
  // '총합' 항목을 완벽히 제외하고 실제 자산군 비중만 추출
  const validCategories = categories.filter(c => c.name !== '총합' && c.name !== '합계');
  const finals = [];
  
  for (let s = 0; s < numSims; s++) {
    let v = totalAmount;
    for (let year = 2026; year <= 2035; year++) {
      const stageKey = stageForYear(year);
      let nextV = 0;
      validCategories.forEach(cat => {
        const weight = cat[stageKey] || 0;
        const alloc = v * weight;
        const params = ASSUMPTIONS[cat.name] || { ret: 0.05, vol: 0.1 };
        const yearReturn = params.ret + params.vol * gaussian();
        nextV += alloc * (1 + Math.max(yearReturn, -0.9));
      });
      v = nextV;
    }
    finals.push(v);
  }
  finals.sort((a, b) => a - b);
  const p = (q) => finals[Math.floor(q * (finals.length - 1))];
  const min = finals[0], max = finals[finals.length - 1];
  const bins = 14;
  const step = (max - min) / bins || 1;
  const hist = Array.from({ length: bins }, (_, i) => ({ range: fmtKRW(min + i * step), count: 0 }));
  finals.forEach(v => {
    let idx = Math.min(bins - 1, Math.floor((v - min) / step));
    hist[idx].count += 1;
  });
  return {
    p5: p(0.05), p25: p(0.25), p50: p(0.5), p75: p(0.75), p95: p(0.95),
    mean: finals.reduce((s, x) => s + x, 0) / finals.length,
    hist,
  };
}

function SegControl({ value, onChange, options }) {

          style={{
            backgroundColor: value === opt.key ? INK : 'transparent',
            color: value === opt.key ? PAPER : opt.enabled === false ? '#B3AE9C' : '#5B5744',
          }}

          <span>{opt.icon}</span>
          {opt.label}
        </button>
      ))}

  );
}

function WealthDashboard() {
  const [tab, setTab] = useState('stocks');
  const [showSettings, setShowSettings] = useState(false);
  const [endpointUrl, setEndpointUrl] = useState('');
  const [data, setData] = useState(DEMO);
  const [loading, setLoading] = useState(false);
  const [connected, setConnected] = useState(false);
  const [error, setError] = useState('');
  const [mc, setMc] = useState(null);
  const [mcRunning, setMcRunning] = useState(false);

  function connect() {
    if (!endpointUrl) return;
    setLoading(true);
    setError('');

    const callbackName = 'wealthDashboardCb_' + Date.now();
    const timeoutId = setTimeout(() => {
      cleanup();
      setError('연결 시간 초과. URL과 배포 상태를 확인해주세요.');
      setLoading(false);
    }, 10000);

    function cleanup() {
      clearTimeout(timeoutId);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = (json) => {
      cleanup();
      setData(json);
      setConnected(true);
      setShowSettings(false);
      setLoading(false);
    };

    const sep = endpointUrl.includes('?') ? '&' : '?';
    const script = document.createElement('script');
    script.src = endpointUrl + sep + 'callback=' + callbackName;
    script.onerror = () => {
      cleanup();
      setError('연결 실패. 배포 URL과 액세스 권한(링크가 있는 모든 사용자)을 확인해주세요.');
      setLoading(false);
    };
    document.body.appendChild(script);
  }

  // 구글 시트에서 가져온 데이터 중 '총합' 성격의 행을 제외하는 필터 로직
  const filteredCategories = useMemo(() => {
    if (!data.investPlan || !data.investPlan.categories) return [];
    return data.investPlan.categories.filter(c => c.name !== '총합' && c.name !== '합계');
  }, [data.investPlan]);

  const byAsset = useMemo(() => {
    const map = {};
    data.stockHoldings.forEach(h => { 
      if (h.asset !== '총합' && h.asset !== '합계') {
        map[h.asset] = (map[h.asset] || 0) + h.value; 
      }
    });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [data.stockHoldings]);

  const totalValue = useMemo(() => byAsset.reduce((s, x) => s + x.value, 0), [byAsset]);

  const byAssetWithPct = useMemo(() => {
    return byAsset
      .map(a => ({ ...a, pct: totalValue ? (a.value / totalValue) * 100 : 0 }))
      .sort((a, b) => b.value - a.value);
  }, [byAsset, totalValue]);

  const currentVsTarget2026 = useMemo(() => {
    return filteredCategories.map(c => ({
      name: c.name,
      현재: Math.round(c.currentRatio * 1000) / 10,
      목표: Math.round(c.stage1Target * 1000) / 10,
    }));
  }, [filteredCategories]);

  const glideData = useMemo(() => {
    const stages = data.investPlan.stages;
    return stages.map(st => {
      const row = { period: st.period };
      filteredCategories.forEach(c => {
        const key = st.key + 'Target';
        row[c.name] = Math.round((c[key] || 0) * 1000) / 10;
      });
      return row;
    });
  }, [data.investPlan, filteredCategories]);

  function handleRunMonteCarlo() {
    setMcRunning(true);
    setTimeout(() => {
      // 몬테카를로 내부에서도 filteredCategories를 활용하도록 연계
      const result = runMonteCarlo(filteredCategories, data.investPlan.totalAmount, 1500);
      setMc(result);
      setMcRunning(false);
    }, 50);
  }

  const catColors = ['#B8863B', '#A8553F', '#6B9080', '#6E86A8', '#8A8677'];
  const tooltipBase = { contentStyle: { backgroundColor: INK, border: 'none', borderRadius: 8, color: PAPER }, itemStyle: { color: PAPER }, labelStyle: { color: PAPER } };

  return (
    <div className="min-h-screen w-full" style={{ backgroundColor: INK, fontFamily: 'Georgia, "Noto Serif KR", serif' }}>
      <div className="max-w-md mx-auto px-4 pt-6 pb-10">

        <div className="flex items-start justify-between mb-4">
          <div>
            <div className="text-xs tracking-widest uppercase" style={{ color: GOLD }}>Wealth Ledger</div>
            <h1 className="text-2xl font-normal mt-0.5" style={{ color: PAPER }}>주식 자산 현황</h1>
          </div>

        <div className="mb-5">

        {tab === 'stocks' && (

                  </div>

              </div>
            </div>

            <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
              <div className="text-sm font-medium mb-3" style={{ color: INK }}>2026년 현재 vs 목표(1단계)</div>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={currentVsTarget2026} barGap={4}>

                  <XAxis dataKey="name" tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} unit="%" />
                  <Tooltip {...tooltipBase} />

                  <Bar dataKey="목표" fill={GOLD} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div className="rounded-2xl p-4" style={{ backgroundColor: PAPER }}>
              <div className="text-sm font-medium mb-1" style={{ color: INK }}>글라이드슬롭 (3단계 계획)</div>
              <div className="text-xs mb-3" style={{ color: MUTED }}>2026~29 → 2030~32 → 2033~35, 목표 비중 변화</div>
              <ResponsiveContainer width="100%" height={200}>

                  <XAxis dataKey="period" tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: '#5B5744', fontSize: 11 }} axisLine={false} tickLine={false} unit="%" />
                  <Tooltip {...tooltipBase} />

                2026→2035, 총 {fmtKRW(data.investPlan.totalAmount)}원 기준 · 단계별 목표배분 리밸런싱 가정 · 1,500회 시뮬레이션

              {!mc && <div className="text-xs py-6 text-center" style={{ color: MUTED }}>"실행"을 눌러 2035년 예상 자산 분포를 계산하세요</div>}

              {mc && (
                <>

                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace', color: RUST }}>{fmtKRW(mc.p5)}원</div>
                    </div>
                    <div className="rounded-lg p-2" style={{ backgroundColor: '#E5DFCE' }}>
                      <div style={{ color: MUTED }}>상위 5% (낙관)</div>
                      <div className="tabular-nums font-medium" style={{ fontFamily: 'ui-monospace, monospace', color: SAGE }}>{fmtKRW(mc.p95)}원</div>
                    </div>
                  </div>
                  <div className="text-xs mt-3" style={{ color: MUTED }}>
                    가정: Nasdaq 11%/22%, S&P500 8.5%/16%, Dividend 7%/13%, Bond 4%/6%, CASH 3.2%/1% (기대수익률/변동성). 필요시 조정 가능.
                  </div>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WealthDashboard />);
</script>
