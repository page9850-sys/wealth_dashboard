<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 대시보드</title>
  <!-- Tailwind CSS & React / Babel CDNs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f8fafc;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const DEFAULT_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbymr_oUwSV_1z9Cvqreq0rjcqxiTpuzgCz7K_b-2steRSe5LMV2Fj2f4MgYM9UjjgTS9A/exec';

    const INITIAL_DATA = {
      stockHoldings: [],
      investPlan: { stages: [], categories: [], totalAmount: 0 },
      realEstate: []
    };

    function App() {
      const [data, setData] = useState(INITIAL_DATA);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [activeTab, setActiveTab] = useState('summary');
      const [webAppUrl, setWebAppUrl] = useState(() => localStorage.getItem('WEBSITE_WEBAPP_URL') || DEFAULT_WEBAPP_URL);

      const fetchData = (url) => {
        if (!url) return;
        setLoading(true);
        setError(null);

        const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');

        const cleanup = () => {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        };

        window[callbackName] = (json) => {
          cleanup();
          if (json) {
            // realEstate 및 realestate 호환 처리
            const reList = json.realEstate || json.realestate || [];
            setData({
              ...json,
              realEstate: reList
            });
          } else {
            setError('전달된 데이터 형식이 올바르지 않습니다.');
          }
          setLoading(false);
        };

        script.onerror = () => {
          cleanup();
          setError('데이터를 불러오는데 실패했습니다. URL을 확인해주세요.');
          setLoading(false);
        };

        const delimiter = url.includes('?') ? '&' : '?';
        script.src = `${url}${delimiter}callback=${callbackName}`;
        document.body.appendChild(script);
      };

      useEffect(() => {
        fetchData(webAppUrl);
      }, []);

      const handleSaveUrl = (e) => {
        e.preventDefault();
        const url = e.target.url.value.trim();
        setWebAppUrl(url);
        localStorage.setItem('WEBSITE_WEBAPP_URL', url);
        fetchData(url);
      };

      const stockTotal = useMemo(() => {
        return (data.stockHoldings || []).reduce((acc, cur) => acc + (cur.value || 0), 0);
      }, [data.stockHoldings]);

      const realEstateTotal = useMemo(() => {
        return (data.realEstate || []).reduce((acc, cur) => {
          const latestInspection = cur.inspections && cur.inspections.length > 0 ? cur.inspections[cur.inspections.length - 1] : null;
          const price = latestInspection ? latestInspection.price : (cur.acquireAmount || cur.price || 0);
          return acc + price;
        }, 0);
      }, [data.realEstate]);

      const grandTotal = stockTotal + realEstateTotal;

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <header className="flex flex-col md:flex-row md:items-center md:justify-between pb-6 mb-6 border-b border-slate-200 gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">자산 통합 대시보드</h1>
              <p className="text-sm text-slate-500 mt-1">주식 및 부동산 자산 현황을 관리합니다.</p>
            </div>

            <form onSubmit={handleSaveUrl} className="flex gap-2 items-center">
              <input
                type="url"
                name="url"
                defaultValue={webAppUrl}
                placeholder="Google Apps Script 웹앱 URL"
                className="px-3 py-1.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-64 md:w-80"
                required
              />
              <button
                type="submit"
                disabled={loading}
                className="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-50"
              >
                {loading ? '동기화 중...' : '동기화'}
              </button>
            </form>
          </header>

          {error && (
            <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
              {error}
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">총 자산</span>
              <div className="text-2xl font-bold text-slate-900 mt-2">
                ₩ {grandTotal.toLocaleString()}
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">금융 자산 (주식/현금)</span>
              <div className="text-2xl font-bold text-blue-600 mt-2">
                ₩ {stockTotal.toLocaleString()}
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">부동산 자산</span>
              <div className="text-2xl font-bold text-emerald-600 mt-2">
                ₩ {realEstateTotal.toLocaleString()}
              </div>
            </div>
          </div>

          <div className="flex border-b border-slate-200 mb-6 gap-6">
            <button
              onClick={() => setActiveTab('summary')}
              className={`pb-3 font-medium text-sm transition-colors relative ${
                activeTab === 'summary' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-500 hover:text-slate-700'
              }`}
            >
              요약
            </button>
            <button
              onClick={() => setActiveTab('stock')}
              className={`pb-3 font-medium text-sm transition-colors relative ${
                activeTab === 'stock' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-500 hover:text-slate-700'
              }`}
            >
              주식 자산 ({data.stockHoldings?.length || 0})
            </button>
            <button
              onClick={() => setActiveTab('realestate')}
              className={`pb-3 font-medium text-sm transition-colors relative ${
                activeTab === 'realestate' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-500 hover:text-slate-700'
              }`}
            >
              부동산 자산 ({data.realEstate?.length || 0})
            </button>
          </div>

          {activeTab === 'summary' && (
            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <h2 className="text-lg font-bold text-slate-900 mb-4">포트폴리오 요약</h2>
              <p className="text-slate-600 text-sm">
                상단 탭을 통해 주식 및 부동산 자산의 상세 정보와 임대/세금 현황을 확인하실 수 있습니다.
              </p>
            </div>
          )}

          {activeTab === 'stock' && (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="p-6 border-b border-slate-200">
                <h2 className="text-lg font-bold text-slate-900">주식 보유 현황</h2>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left text-slate-600">
                  <thead className="bg-slate-50 text-slate-700 font-semibold border-b border-slate-200">
                    <tr>
                      <th className="px-6 py-3">소유자</th>
                      <th className="px-6 py-3">증권사</th>
                      <th className="px-6 py-3">계좌</th>
                      <th className="px-6 py-3">종목명</th>
                      <th className="px-6 py-3 text-right">보유수량</th>
                      <th className="px-6 py-3 text-right">평가금액</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-200">
                    {data.stockHoldings && data.stockHoldings.length > 0 ? (
                      data.stockHoldings.map((item, idx) => (
                        <tr key={idx} className="hover:bg-slate-50">
                          <td className="px-6 py-4">{item.person}</td>
                          <td className="px-6 py-4">{item.broker}</td>
                          <td className="px-6 py-4">{item.account}</td>
                          <td className="px-6 py-4 font-medium text-slate-900">{item.name}</td>
                          <td className="px-6 py-4 text-right">{item.shares?.toLocaleString()}</td>
                          <td className="px-6 py-4 text-right font-medium text-slate-900">
                            ₩ {Math.round(item.value || 0).toLocaleString()}
                          </td>
                        </tr>
                      ))
                    ) : (
                      <tr>
                        <td colSpan="6" className="px-6 py-8 text-center text-slate-400">
                          등록된 주식 데이터가 없습니다.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeTab === 'realestate' && (
            <div className="space-y-6">
              {data.realEstate && data.realEstate.length > 0 ? (
                data.realEstate.map((prop, idx) => {
                  const latestInspection = prop.inspections && prop.inspections.length > 0 ? prop.inspections[prop.inspections.length - 1] : null;
                  const price = latestInspection ? latestInspection.price : (prop.acquireAmount || prop.price || 0);
                  return (
                    <div key={prop.id || idx} className="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                      <div className="flex flex-col md:flex-row justify-between md:items-center pb-4 border-b border-slate-200 gap-2">
                        <div>
                          <span className="inline-block px-2.5 py-0.5 text-xs font-semibold bg-emerald-50 text-emerald-700 rounded-full mb-1">
                            {prop.type || '부동산'} ({prop.ownership || '소유'})
                          </span>
                          <h3 className="text-xl font-bold text-slate-900">{prop.address || prop.name || '부동산 항목'}</h3>
                          <p className="text-sm text-slate-500">{prop.dong} {prop.ho} {prop.area ? `(면적: ${prop.area}㎡)` : ''}</p>
                        </div>
                        <div className="text-right">
                          <span className="text-xs text-slate-400 block">추정 시세 / 금액</span>
                          <span className="text-2xl font-bold text-emerald-600">
                            ₩ {price.toLocaleString()}
                          </span>
                        </div>
                      </div>

                      <div className="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                          <h4 className="text-sm font-semibold text-slate-900 mb-3">임대차 계약 정보</h4>
                          {prop.tenants && prop.tenants.length > 0 ? (
                            <div className="space-y-2">
                              {prop.tenants.map((t, tIdx) => (
                                <div key={tIdx} className="p-3 bg-slate-50 rounded-lg text-xs flex justify-between items-center">
                                  <div>
                                    <span className="font-semibold text-slate-700">[{t.contractType || '계약'}]</span> {t.tenant}
                                  </div>
                                  <div className="font-medium text-slate-900">
                                    보증금: ₩ {(t.deposit || 0).toLocaleString()} {t.rent > 0 && `/ 월 ₩ ${t.rent.toLocaleString()}`}
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : (
                            <p className="text-xs text-slate-400 p-3 bg-slate-50 rounded-lg">등록된 임차인 정보가 없습니다.</p>
                          )}
                        </div>

                        <div>
                          <h4 className="text-sm font-semibold text-slate-900 mb-3">유지보수 내역</h4>
                          {prop.maintenance && prop.maintenance.length > 0 ? (
                            <div className="space-y-2">
                              {prop.maintenance.map((m, mIdx) => (
                                <div key={mIdx} className="p-3 bg-slate-50 rounded-lg text-xs flex justify-between items-center">
                                  <div>
                                    <span className="text-slate-500">{m.date}</span> - <span className="font-medium">{m.item}</span>
                                  </div>
                                  <div className="font-medium text-slate-900">
                                    ₩ {(m.cost || 0).toLocaleString()}
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : (
                            <p className="text-xs text-slate-400 p-3 bg-slate-50 rounded-lg">등록된 유지보수 내역이 없습니다.</p>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })
              ) : (
                <div className="bg-white p-12 rounded-xl border border-slate-200 text-center text-slate-400">
                  등록된 부동산 정보가 없거나 데이터를 불러오는 중입니다.
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
