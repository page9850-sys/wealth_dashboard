  <script>
    function showFatal(msg) {
      var el = document.createElement('div');
      el.style.cssText = 'color:#F3EFE4;background:#1B1F2A;padding:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;min-height:100vh;box-sizing:border-box;';
      el.textContent = '시스템 초기화 에러: ' + msg;
      if (document.body) {
        document.body.innerHTML = '';
        document.body.appendChild(el);
      } else {
        window.addEventListener('DOMContentLoaded', function () {
          document.body.innerHTML = '';
          document.body.appendChild(el);
        });
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com" onerror="showFatal('Tailwind CDN 로드 실패')"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="showFatal('React 로드 실패')"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="showFatal('ReactDOM 로드 실패')"></script>

  <script src="https://unpkg.com/prop-types/prop-types.js" onerror="showFatal('prop-types 로드 실패')"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js" onerror="showFatal('Recharts 로드 실패')"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="showFatal('Babel Standalone 로드 실패')"></script>
  <style>
    body { margin: 0; }
    ::-webkit-scrollbar { display: none !important; }
  </style>
</head>

        { person: '갱이', name: 'SCHD(갱이)', asset: 'S&P500', avgPrice: 480000, value: 518915.5875 },
        { person: '갱이', name: 'Vangard S&P 500(갱이)', asset: 'S&P500', avgPrice: 12500000, value: 13854133.05 },
        { person: '갱이', name: 'QQQM(갱이)', asset: 'Nasdaq', avgPrice: 8500000, value: 9140417.805 },
        { person: '갱이', name: 'ACE 미국 S&P500 ETF(갱이)', asset: 'S&P500', avgPrice: 2200000, value: 2420000 },
        { person: '갱이', name: 'Tiger 미국 나스닥 100 ETF(갱이)', asset: 'Nasdaq', avgPrice: 1800000, value: 1980000 },
        { person: '갱이', name: '현금자산(갱이)', asset: 'CASH', avgPrice: 3100000, value: 3100000 }
      ],
      investPlan: {
        stages: [
          { key: 'stage1Target', period: '2026~29', label: '1단계 (2026~2029)' },
          { key: 'stage2Target', period: '2030~32', label: '2단계 (2030~2032)' },
          { key: 'stage3Target', period: '2033~35', label: '3단계 (2033~2035)' }
        ],
        categories: [
          { name: 'Nasdaq', currentAmount: 0, currentRatio: 0, stage1Target: 0.20, stage2Target: 0.15, stage3Target: 0.05 },
          { name: 'S&P500', currentAmount: 0, currentRatio: 0, stage1Target: 0.65, stage2Target: 0.45, stage3Target: 0.35 },
          { name: 'Dividend', currentAmount: 0, currentRatio: 0, stage1Target: 0.05, stage2Target: 0.25, stage3Target: 0.45 },
          { name: 'CASH', currentAmount: 0, currentRatio: 0, stage1Target: 0.09, stage2Target: 0.15, stage3Target: 0.15 },
          { name: 'Bond', currentAmount: 0, currentRatio: 0, stage1Target: 0.01, stage2Target: 0.00, stage3Target: 0.00 }
        ],
        totalAmount: 0
      },
      realEstate: [
        {
          id: 're1',
          type: '아파트',
          address: '서울특별시 서대문구 남가좌동 385, 디엠씨파크뷰자이',
          ownership: '갭투자',
          dong: '제303동',
          ho: '제1003호',
          area: 59.9,
          acquireDate: "'22.02",
          acquireAmount: 100000000,
          inspections: [{ month: "'26.07", price: 500000000, officialPrice: 300000000 }],
          taxes: [
            { taxMonth: "'25.05", propertyTax: null, comprehensiveTax: 1500000 },
            { taxMonth: "'25.07", propertyTax: 1500000, comprehensiveTax: null },
            { taxMonth: "'26.07", propertyTax: 2000000, comprehensiveTax: null }
          ],
          tenants: [{ tenant: '홍길동', contractType: '전세', deposit: 350000000, rent: 0 }],
          maintenance: [{ date: "'25.05", item: '소화기 교체', cost: 1500000, tenant: '홍길동' }]
        },
        {
          id: 're2',
          type: '아파트',
          address: '경기도 파주시 목동동 1142, 롯데캐슬파크타운2차',
          ownership: '자가',
          dong: '제807동',
          ho: '제2001호',
          area: 84.9,
          acquireDate: "'20.05",
          acquireAmount: 450000000,
          inspections: [{ month: "'26.07", price: 650000000, officialPrice: 420000000 }],
          taxes: [
            { taxMonth: "'25.07", propertyTax: 850000, comprehensiveTax: null }
          ],
          tenants: [],
          maintenance: [{ date: "'26.01", item: '보일러 수리', cost: 350000, tenant: '자가' }]
        }
      ]
    };

    const ASSET_COLORS = {
      Nasdaq: '#3B82F6',
      S&P500: '#10B981',
      Dividend: '#F59E0B',
      CASH: '#6B7280',
      Bond: '#8B5CF6'
    };

    function App() {
      const [data, setData] = useState(DEMO);
      const [apiUrl, setApiUrl] = useState(() => localStorage.getItem("WEBSITE_WEBAPP_URL") || DEFAULT_API_URL);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedPerson, setSelectedPerson] = useState('ALL');
      const [activeTab, setActiveTab] = useState('stock'); // 'stock' | 'realestate' | 'retire'
      const [expandedTenant, setExpandedTenant] = useState({});

      // 은퇴 시뮬레이션 관련 상태
      const [retireYears, setRetireYears] = useState(30);
      const [annualWithdrawRate, setAnnualWithdrawRate] = useState(4);
      const [expectedReturn, setExpectedReturn] = useState(7);
      const [inflationRate, setInflationRate] = useState(2.5);

      // ─── API 동기화 (JSONP) ───
      const fetchData = (url) => {
        if (!url) return;
        setLoading(true);
        setError(null);

        const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
        const script = document.createElement('script');

        const cleanup = () => {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        };

        window[callbackName] = (json) => {
          cleanup();
          if (json) {
            const reList = json.realEstate || json.realestate || [];
            setData(prev => ({
              ...prev,
              stockHoldings: (json.stockHoldings && json.stockHoldings.length > 0) ? json.stockHoldings : prev.stockHoldings,
              investPlan: json.investPlan || prev.investPlan,
              realEstate: (reList && reList.length > 0) ? reList : prev.realEstate
            }));
          } else {
            setError('전달된 데이터 형식이 올바르지 않습니다.');
          }
          setLoading(false);
        };

        script.onerror = () => {
          cleanup();
          setError('데이터 동기화 실패. URL 및 Google Apps Script 배포 설정을 확인해주세요.');
          setLoading(false);
        };

        const delimiter = url.includes('?') ? '&' : '?';
        script.src = `${url}${delimiter}callback=${callbackName}`;
        document.body.appendChild(script);
      };

      useEffect(() => {
        fetchData(apiUrl);
      }, []);

      const handleSaveUrl = (e) => {
        e.preventDefault();
        const url = e.target.url.value.trim();
        setApiUrl(url);
        localStorage.setItem("WEBSITE_WEBAPP_URL", url);
        fetchData(url);
      };

      const toggleTenant = (id) => {
        setExpandedTenant(prev => ({ ...prev, [id]: !prev[id] }));
      };

      // ─── 주식 계산 ───
      const filteredHoldings = useMemo(() => {
        if (selectedPerson === 'ALL') return data.stockHoldings || [];
        return (data.stockHoldings || []).filter(h => h.person === selectedPerson);
      }, [data.stockHoldings, selectedPerson]);

      const totalStockValue = useMemo(() => {
        return filteredHoldings.reduce((sum, h) => sum + (h.value || 0), 0);
      }, [filteredHoldings]);

      const totalStockCost = useMemo(() => {
        return filteredHoldings.reduce((sum, h) => sum + (h.avgPrice || 0), 0);
      }, [filteredHoldings]);

      const totalStockProfit = totalStockValue - totalStockCost;
      const totalStockProfitRate = totalStockCost > 0 ? ((totalStockProfit / totalStockCost) * 100).toFixed(1) : '0.0';

      const assetCategorySummary = useMemo(() => {
        const catMap = { Nasdaq: 0, S&P500: 0, Dividend: 0, CASH: 0, Bond: 0 };
        filteredHoldings.forEach(h => {
          const key = h.asset || 'CASH';
          if (catMap[key] !== undefined) catMap[key] += (h.value || 0);
          else catMap['CASH'] += (h.value || 0);
        });

        return Object.keys(catMap).map(key => ({
          name: key,
          value: catMap[key],
          ratio: totalStockValue > 0 ? (catMap[key] / totalStockValue) : 0
        }));
      }, [filteredHoldings, totalStockValue]);

      // ─── 부동산 계산 ───
      const totalRealEstateValue = useMemo(() => {
        return (data.realEstate || []).reduce((sum, item) => {
          const lastInsp = item.inspections && item.inspections.length > 0 ? item.inspections[item.inspections.length - 1] : null;
          const price = lastInsp ? (lastInsp.price || lastInsp.officialPrice || 0) : (item.acquireAmount || 0);
          return sum + price;
        }, 0);
      }, [data.realEstate]);

      const grandTotalAssets = totalStockValue + totalRealEstateValue;

      // ─── 은퇴 시뮬레이션 계산 ───
      const monteCarloData = useMemo(() => {
        const initialAsset = grandTotalAssets;
        if (initialAsset <= 0) return [];

        const realReturn = (expectedReturn - inflationRate) / 100;
        const result = [];
        let currentBalance = initialAsset;
        let initialWithdrawal = initialAsset * (annualWithdrawRate / 100);

        for (let year = 0; year <= retireYears; year++) {
          result.push({
            year: `+${year}년`,
            balance: Math.max(0, Math.round(currentBalance / 10000)), // 만원 단위
            withdrawal: Math.round(initialWithdrawal / 10000)
          });

          // 다음 해 자산 계산 (수익 반영 후 생활비 인출)
          currentBalance = currentBalance * (1 + realReturn) - initialWithdrawal;
          initialWithdrawal = initialWithdrawal * (1 + inflationRate / 100);
        }
        return result;
      }, [grandTotalAssets, retireYears, annualWithdrawRate, expectedReturn, inflationRate]);

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          {/* 상단 헤더 및 API 설정 */}
          <header className="flex flex-col md:flex-row justify-between items-start md:items-center pb-6 mb-6 border-b border-slate-800 gap-4">
            <div>
              <span className="text-xs font-bold text-amber-500 tracking-widest uppercase">WEALTH LEDGER</span>
              <h1 className="text-2xl font-bold text-white mt-0.5">금융 & 부동산 자산 현황</h1>
            </div>

            <form onSubmit={handleSaveUrl} className="flex gap-2 w-full md:w-auto">
              <input
                type="url"
                name="url"
                defaultValue={apiUrl}
                placeholder="Google Apps Script 웹앱 URL"
                className="px-3 py-1.5 text-xs bg-slate-900 border border-slate-700 text-slate-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-amber-500 w-full md:w-80"
                required
              />
              <button
                type="submit"
                disabled={loading}
                className="px-4 py-1.5 bg-amber-600 hover:bg-amber-500 text-slate-950 text-xs font-bold rounded-lg transition-all disabled:opacity-50 whitespace-nowrap"
              >
                {loading ? '동기화 중...' : '🔄 실시간 동기화'}
              </button>
            </form>
          </header>

          {error && (
            <div className="mb-6 p-4 bg-rose-950/50 border border-rose-500/50 text-rose-300 text-xs rounded-lg">
              {error}
            </div>
          )}

          {/* 총 자산 카드 */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
              <span className="text-xs text-slate-400 font-medium">총 순자산 평가액</span>
              <div className="text-2xl font-bold text-white mt-2">
                ₩ {grandTotalAssets.toLocaleString()}
              </div>
              <p className="text-xs text-slate-500 mt-1">
                (약 {(grandTotalAssets / 100000000).toFixed(2)} 억원)
              </p>
            </div>

            <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
              <span className="text-xs text-slate-400 font-medium">📈 주식/금융 자산</span>
              <div className="text-2xl font-bold text-amber-400 mt-2">
                ₩ {totalStockValue.toLocaleString()}
              </div>
              <p className="text-xs text-emerald-400 mt-1">
                수익률: +{totalStockProfitRate}% (+₩ {totalStockProfit.toLocaleString()})
              </p>
            </div>

            <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
              <span className="text-xs text-slate-400 font-medium">🏢 부동산 자산 (시세)</span>
              <div className="text-2xl font-bold text-emerald-400 mt-2">
                ₩ {totalRealEstateValue.toLocaleString()}
              </div>
              <p className="text-xs text-slate-500 mt-1">
                (약 {(totalRealEstateValue / 100000000).toFixed(2)} 억원)
              </p>
            </div>
          </div>

          {/* 탭 네비게이션 */}
          <div className="flex justify-between items-center border-b border-slate-800 pb-4 mb-8">
            <div className="flex gap-3">
              <button
                onClick={() => setActiveTab('stock')}
                className={`px-4 py-2 rounded-lg text-xs font-semibold transition-all ${
                  activeTab === 'stock' ? 'bg-amber-500 text-slate-950' : 'bg-slate-800/50 text-slate-400 hover:text-white'
                }`}
              >
                📈 주식 자산 ({filteredHoldings.length})
              </button>
              <button
                onClick={() => setActiveTab('realestate')}
                className={`px-4 py-2 rounded-lg text-xs font-semibold transition-all ${
                  activeTab === 'realestate' ? 'bg-amber-500 text-slate-950' : 'bg-slate-800/50 text-slate-400 hover:text-white'
                }`}
              >
                🏢 부동산 자산 ({data.realEstate?.length || 0})
              </button>
              <button
                onClick={() => setActiveTab('retire')}
                className={`px-4 py-2 rounded-lg text-xs font-semibold transition-all ${
                  activeTab === 'retire' ? 'bg-amber-500 text-slate-950' : 'bg-slate-800/50 text-slate-400 hover:text-white'
                }`}
              >
                🔮 은퇴 몬테카를로 시뮬레이션
              </button>
            </div>

            {/* 소유자 필터 (주식 탭일 때만 활성화) */}
            {activeTab === 'stock' && (
              <div className="flex gap-2">
                {['ALL', '용이', '갱이'].map(p => (
                  <button
                    key={p}
                    onClick={() => setSelectedPerson(p)}
                    className={`px-3 py-1 rounded text-xs transition-all ${
                      selectedPerson === p ? 'bg-slate-700 text-amber-400 font-bold' : 'text-slate-400 hover:text-slate-200'
                    }`}
                  >
                    {p === 'ALL' ? '전체' : p}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* ─── 탭 1: 주식 자산 ─── */}
          {activeTab === 'stock' && (
            <div className="space-y-8">
              {/* 차트 섹션 */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* 포트폴리오 비중 차트 */}
                <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
                  <h3 className="text-sm font-bold text-white mb-4">자산군별 비중 현황</h3>
                  <div className="h-64">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={assetCategorySummary}
                          dataKey="value"
                          nameKey="name"
                          cx="50%"
                          cy="50%"
                          outerRadius={80}
                          label={({ name, ratio }) => `${name} ${(ratio * 100).toFixed(0)}%`}
                        >
                          {assetCategorySummary.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={ASSET_COLORS[entry.name] || '#6B7280'} />
                          ))}
                        </Pie>
                        <Tooltip formatter={(value) => `₩ ${value.toLocaleString()}`} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                {/* 목표 단계별 로드맵 차트 */}
                <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
                  <h3 className="text-sm font-bold text-white mb-4">리밸런싱 단계별 목표 비중</h3>
                  <div className="h-64">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={data.investPlan?.categories || []}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#2D3748" />
                        <XAxis dataKey="name" stroke="#A0AEC0" />
                        <YAxis stroke="#A0AEC0" tickFormatter={(v) => `${(v * 100).toFixed(0)}%`} />
                        <Tooltip formatter={(v) => `${(v * 100).toFixed(1)}%`} />
                        <Bar dataKey="stage1Target" name="1단계(2026~29)" fill="#3B82F6" />
                        <Bar dataKey="stage2Target" name="2단계(2030~32)" fill="#10B981" />
                        <Bar dataKey="stage3Target" name="3단계(2033~35)" fill="#F59E0B" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>

              {/* 주식 테이블 */}
              <div className="bg-[#1b202e] rounded-xl border border-slate-800 overflow-hidden">
                <div className="p-4 border-b border-slate-800">
                  <h3 className="text-sm font-bold text-white">세부 주식 보유 목록</h3>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs text-left text-slate-300">
                    <thead className="bg-slate-900 text-slate-400 border-b border-slate-800">
                      <tr>
                        <th className="p-3">소유자</th>
                        <th className="p-3">종목명</th>
                        <th className="p-3">자산구분</th>
                        <th className="p-3 text-right">투자원금(매입금)</th>
                        <th className="p-3 text-right">평가금액</th>
                        <th className="p-3 text-right">수익률</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800">
                      {filteredHoldings.map((item, idx) => {
                        const cost = item.avgPrice || 0;
                        const val = item.value || 0;
                        const diff = val - cost;
                        const rate = cost > 0 ? ((diff / cost) * 100).toFixed(1) : '0.0';

                        return (
                          <tr key={idx} className="hover:bg-slate-900/40">
                            <td className="p-3 text-slate-400">{item.person}</td>
                            <td className="p-3 font-semibold text-white">{item.name}</td>
                            <td className="p-3">
                              <span className="px-2 py-0.5 rounded text-[10px] font-bold" style={{ backgroundColor: `${ASSET_COLORS[item.asset]}20`, color: ASSET_COLORS[item.asset] || '#A0AEC0' }}>
                                {item.asset || 'CASH'}
                              </span>
                            </td>
                            <td className="p-3 text-right text-slate-400">₩ {cost.toLocaleString()}</td>
                            <td className="p-3 text-right font-semibold text-white">₩ {val.toLocaleString()}</td>
                            <td className={`p-3 text-right font-bold ${diff >= 0 ? 'text-rose-400' : 'text-blue-400'}`}>
                              {diff >= 0 ? '+' : ''}{rate}%
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* ─── 탭 2: 부동산 자산 ─── */}
          {activeTab === 'realestate' && (
            <div className="space-y-6">
              {data.realEstate && data.realEstate.length > 0 ? (
                data.realEstate.map((item, idx) => {
                  const lastInsp = item.inspections && item.inspections.length > 0 ? item.inspections[item.inspections.length - 1] : null;
                  const currentPrice = lastInsp ? (lastInsp.price || 0) : (item.acquireAmount || 0);
                  const officialPrice = lastInsp ? (lastInsp.officialPrice || 0) : 0;
                  const acquirePrice = item.acquireAmount || 0;
                  const profit = currentPrice - acquirePrice;
                  const profitRate = acquirePrice > 0 ? ((profit / acquirePrice) * 100).toFixed(1) : '0.0';

                  return (
                    <div key={item.id || idx} className="bg-[#1b202e] rounded-xl border border-slate-800 p-6 space-y-6">
                      {/* 카드 헤더 */}
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-4 gap-4">
                        <div>
                          <div className="flex items-center gap-2">
                            <span className="px-2 py-0.5 text-[10px] font-semibold bg-emerald-950 text-emerald-400 border border-emerald-800/50 rounded">
                              {item.type || '부동산'}
                            </span>
                            <span className="text-xs text-amber-400 font-medium">소유형태: {item.ownership || '자가'}</span>
                          </div>
                          <h2 className="text-lg font-bold text-white mt-1">{item.address || item.name}</h2>
                          <p className="text-xs text-slate-400 mt-0.5">
                            {item.dong} {item.ho} {item.area ? `(면적: ${item.area}㎡)` : ''}
                          </p>
                        </div>

                        {/* 가격 요약 */}
                        <div className="text-left md:text-right">
                          <span className="text-xs text-slate-400 block">최근 추정 시세 ({lastInsp ? lastInsp.month : '-'})</span>
                          <span className="text-2xl font-bold text-emerald-400">
                            ₩ {currentPrice.toLocaleString()}
                          </span>
                          <div className="text-xs text-slate-400 mt-0.5">
                            공시가격: <span className="text-slate-200">₩ {officialPrice.toLocaleString()}</span>
                          </div>
                          <div className="text-xs font-semibold text-rose-400 mt-0.5">
                            취득가 대비: +{profitRate}% (+₩ {profit.toLocaleString()})
                          </div>
                        </div>
                      </div>

                      {/* 서브 정보 Grid */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                        {/* 임차인 및 세금 */}
                        <div className="space-y-4">
                          <div>
                            <div className="flex justify-between items-center mb-2">
                              <h3 className="text-xs font-bold text-slate-300">임차인 계약 정보</h3>
                              <button
                                onClick={() => toggleTenant(item.id || idx)}
                                className="text-xs text-amber-400 hover:underline"
                              >
                                {expandedTenant[item.id || idx] ? '접기 ▲' : '자세히 ▼'}
                              </button>
                            </div>

                            <div className="p-3 bg-slate-900/80 rounded-lg text-xs space-y-2 border border-slate-800">
                              {item.tenants && item.tenants.length > 0 ? (
                                item.tenants.map((t, tIdx) => (
                                  <div key={tIdx} className="flex justify-between items-center text-slate-300">
                                    <span>[{t.contractType || '전세'}] {t.tenant}</span>
                                    <span className="font-semibold text-amber-400">
                                      보증금: ₩ {(t.deposit || 0).toLocaleString()} {t.rent > 0 && `/ 월 ₩ ${t.rent.toLocaleString()}`}
                                    </span>
                                  </div>
                                ))
                              ) : (
                                <p className="text-slate-500">등록된 임차인 정보가 없습니다 (자가 거주 등).</p>
                              )}
                            </div>
                          </div>

                          {/* 세금 납부 내역 */}
                          <div>
                            <h3 className="text-xs font-bold text-slate-300 mb-2">세금 납부 내역</h3>
                            <div className="bg-slate-900/60 rounded-lg p-3 border border-slate-800 text-xs">
                              {item.taxes && item.taxes.length > 0 ? (
                                <table className="w-full text-left text-slate-400">
                                  <thead>
                                    <tr className="border-b border-slate-800 text-slate-500">
                                      <th className="pb-1">납부월</th>
                                      <th className="pb-1">재산세</th>
                                      <th className="pb-1">종부세</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-800/40">
                                    {item.taxes.map((tax, taxIdx) => (
                                      <tr key={taxIdx}>
                                        <td className="py-1 text-slate-300">{tax.taxMonth}</td>
                                        <td className="py-1">{tax.propertyTax ? `₩ ${tax.propertyTax.toLocaleString()}` : '-'}</td>
                                        <td className="py-1">{tax.comprehensiveTax ? `₩ ${tax.comprehensiveTax.toLocaleString()}` : '-'}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              ) : (
                                <p className="text-slate-500">등록된 세금 납부 내역이 없습니다.</p>
                              )}
                            </div>
                          </div>
                        </div>

                        {/* 유지보수 내역 */}
                        <div>
                          <h3 className="text-xs font-bold text-slate-300 mb-2">수리 / 유지비 내역</h3>
                          <div className="bg-slate-900/60 rounded-lg p-3 border border-slate-800 text-xs">
                            {item.maintenance && item.maintenance.length > 0 ? (
                              <div className="space-y-2">
                                {item.maintenance.map((m, mIdx) => (
                                  <div key={mIdx} className="flex justify-between items-center text-slate-400">
                                    <div>
                                      <span className="text-slate-500">{m.date}</span> - <span className="text-slate-200">{m.item}</span>
                                    </div>
                                    <div className="font-semibold text-amber-400">
                                      ₩ {(m.cost || 0).toLocaleString()}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            ) : (
                              <p className="text-slate-500">등록된 수리 및 유지비 내역이 없습니다.</p>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })
              ) : (
                <div className="bg-[#1b202e] p-12 rounded-xl text-center text-slate-500 border border-slate-800">
                  부동산 데이터를 불러오는 중이거나 등록된 내역이 없습니다.
                </div>
              )}
            </div>
          )}

          {/* ─── 탭 3: 은퇴 시뮬레이션 ─── */}
          {activeTab === 'retire' && (
            <div className="space-y-6">
              <div className="bg-[#1b202e] p-6 rounded-xl border border-slate-800">
                <h2 className="text-base font-bold text-white mb-4">🔮 몬테카를로 자산 인출 시뮬레이션</h2>
                
                {/* 컨트롤러 패널 */}
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 p-4 bg-slate-900/60 rounded-lg border border-slate-800 text-xs mb-6">
                  <div>
                    <label className="text-slate-400 block mb-1">시뮬레이션 기간 (년)</label>
                    <input
                      type="number"
                      value={retireYears}
                      onChange={(e) => setRetireYears(Number(e.target.value))}
                      className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white"
                    />
                  </div>
                  <div>
                    <label className="text-slate-400 block mb-1">초기 연 인출률 (%)</label>
                    <input
                      type="number"
                      step="0.1"
                      value={annualWithdrawRate}
                      onChange={(e) => setAnnualWithdrawRate(Number(e.target.value))}
                      className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white"
                    />
                  </div>
                  <div>
                    <label className="text-slate-400 block mb-1">기대 연 수익률 (%)</label>
                    <input
                      type="number"
                      step="0.1"
                      value={expectedReturn}
                      onChange={(e) => setExpectedReturn(Number(e.target.value))}
                      className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white"
                    />
                  </div>
                  <div>
                    <label className="text-slate-400 block mb-1">예상 인플레이션율 (%)</label>
                    <input
                      type="number"
                      step="0.1"
                      value={inflationRate}
                      onChange={(e) => setInflationRate(Number(e.target.value))}
                      className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white"
                    />
                  </div>
                </div>

                {/* 차트 영역 */}
                <div className="h-80">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={monteCarloData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#2D3748" />
                      <XAxis dataKey="year" stroke="#A0AEC0" />
                      <YAxis stroke="#A0AEC0" tickFormatter={(v) => `${(v / 10000).toFixed(1)}억`} />
                      <Tooltip formatter={(value) => `₩ ${(value * 10000).toLocaleString()}`} />
                      <Line type="monotone" dataKey="balance" name="잔여 자산(만원)" stroke="#10B981" strokeWidth={2} />
                      <Line type="monotone" dataKey="withdrawal" name="연간 인출액(만원)" stroke="#F59E0B" strokeWidth={2} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
